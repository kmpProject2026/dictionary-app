# .github/workflows/build.yml
name: KMP CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Возможность ручного запуска

env:
  # Оптимизация Gradle
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  # Шаг 1: Запуск тестов
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Ключевой момент для скорости: кэширование Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew jvmTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          
  lint:
      name: Code Linting (detekt)
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4

        - name: Run detekt on all source sets
          # Детальный список задач для полного покрытия KMP
          run: |
            ./gradlew \
              detektMetadataCommonMain \
              detektAndroidMain \
              detektIosArm64Main \
              detektIosSimulatorArm64Main \
              detektDesktopMain \
              detektWasmJsMain

  build-android:
      name: Build Android Debug APK
      runs-on: ubuntu-latest
      needs: [test, lint] # Ждем завершения проверок
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4

        - name: Build APK
          run: ./gradlew :app:assembleDebug # Укажите ваш модуль приложения

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: android-debug-apk
            path: app/build/outputs/apk/debug/*.apk

  build-ios:
      name: Build iOS Simulator App
      runs-on: macos-latest # Только macOS!
      needs: [test, lint]
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4

        - name: Build iOS Framework
          run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

        # Пример сборки Xcode проекта (если есть нативная обертка)
        - name: Build Xcode Project (Optional)
          run: |
            xcodebuild build \
              -project iosApp/iosApp.xcodeproj \
              -scheme iosApp \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15'
